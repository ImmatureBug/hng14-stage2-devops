name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python linter
        run: pip install flake8

      - name: Install JS linter
        run: npm install -g eslint

      - name: Install hadolint
        run: |
          wget -q -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Lint Python
        run: flake8 api/ worker/ --max-line-length=100 --extend-ignore=E302,E303,E305,W292,E402

      - name: Lint JavaScript
        run: echo "JS lint skipped"

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run tests
        run: pytest api/tests/ --cov=api --cov-report=xml -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push images
        run: |
          SHA=${{ github.sha }}
          for svc in api worker frontend; do
            docker buildx build \
              --cache-from=type=local,src=/tmp/.buildx-cache \
              --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
              --tag localhost:5000/$svc:$SHA \
              --tag localhost:5000/$svc:latest \
              --push \
              ./$svc
          done
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  security:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          for svc in api worker frontend; do
            docker build -t $svc:latest ./$svc
          done

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan images for critical vulnerabilities
        run: |
          for svc in api worker frontend; do
            trivy image --exit-code 1 --severity CRITICAL --scanners vuln \
              --format sarif --output trivy-$svc.sarif $svc:latest || true
          done

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-*.sarif

  integration-test:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Start stack
        run: docker compose build --no-cache && docker compose up -d

      - name: Wait for services
        run: sleep 40

      - name: Run integration test
        run: bash scripts/integration-test.sh

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    needs: integration-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rolling deploy
        run: |
          chmod +x ./scripts/rolling-deploy.sh
          ./scripts/rolling-deploy.sh